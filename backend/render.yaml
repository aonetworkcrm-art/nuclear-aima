# Nuclear AIMA — Backend API en Render (Docker)
# https://render.com/docs/deploy-flask
# Usa Dockerfile en backend/ para instalar Chrome + Selenium
services:
  - type: web
    name: nuclear-aima-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
